<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Download — Preparo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #181410;
    --surface: #231A14;
    --surface2:#2E2218;
    --border:  #42302F;
    --accent:  #D4711A;
    --green:   #4CAF72;
    --blue:    #5A9FD4;
    --red:     #D95C5C;
    --text:    #EAE5E0;
    --muted:   #8A7870;
    --shadow:  0 2px 8px rgba(0,0,0,.35);
    --radius:  8px;
  }
  [data-theme="light"] {
    --bg:      #F2EDE8;
    --surface: #FFFFFF;
    --surface2:#EDE4DE;
    --border:  #D0C0BA;
    --accent:  #8B4513;
    --text:    #1C1A18;
    --muted:   #6B5B50;
    --shadow:  0 2px 8px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter','Segoe UI',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 36px; height: 36px; background: var(--accent); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; color: #fff;
  }
  .logo-text { font-size: 14px; font-weight: 700; }
  .logo-sub  { font-size: 11px; color: var(--muted); font-family: monospace; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .btn-header {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 14px; font-size: 12px; font-weight: 600; color: var(--text);
    cursor: pointer; text-decoration: none; transition: border-color .2s;
    font-family: inherit;
  }
  .btn-header:hover { border-color: var(--accent); color: var(--accent); }
  .theme-toggle {
    width: 34px; height: 34px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 15px; transition: border-color .2s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  .main { max-width: 1000px; margin: 0 auto; padding: 28px 24px; }

  .toolbar {
    display: flex; gap: 12px; align-items: center; margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 9px 12px 9px 36px;
    color: var(--text); font-family: inherit; font-size: 13px; outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
  .counter { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .releases-grid { display: flex; flex-direction: column; gap: 14px; }

  .release-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; box-shadow: var(--shadow);
    transition: border-color .2s;
  }
  .release-card:hover { border-color: var(--accent); }
  .release-header {
    padding: 14px 18px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .release-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .release-cod {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 8px; font-size: 11px; font-family: monospace; color: var(--muted); font-weight: 400;
  }
  .release-date { font-size: 11px; color: var(--muted); }
  .release-chevron { color: var(--muted); font-size: 12px; transition: transform .2s; }
  .release-card.open .release-chevron { transform: rotate(180deg); }

  .release-assets { padding: 14px 18px; display: none; flex-direction: column; gap: 8px; }
  .release-card.open .release-assets { display: flex; }

  .asset-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); transition: border-color .15s;
  }
  .asset-row:hover { border-color: var(--accent); }
  .asset-left  { display: flex; align-items: center; gap: 10px; }
  .asset-icon  { font-size: 18px; width: 24px; text-align: center; }
  .asset-name  { font-size: 13px; font-weight: 500; font-family: monospace; }
  .asset-size  { font-size: 11px; color: var(--muted); }
  .btn-download {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
    text-decoration: none; transition: opacity .15s; font-family: inherit;
  }
  .btn-download:hover { opacity: .85; }

  .btn-view {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
    transition: border-color .15s; font-family: inherit;
  }
  .btn-view:hover { border-color: var(--accent); color: var(--accent); }
  .asset-actions { display: flex; gap: 8px; }

  .viewer-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .viewer-overlay.open { display: flex; }
  .viewer-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    width: 90vw; height: 90vh; max-width: 1100px; display: flex; flex-direction: column;
    box-shadow: var(--shadow); overflow: hidden;
  }
  .viewer-header {
    padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .viewer-title { font-size: 13px; font-weight: 700; font-family: monospace; }
  .viewer-close {
    background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer;
    line-height: 1; padding: 0 4px;
  }
  .viewer-close:hover { color: var(--red); }
  .viewer-body { flex: 1; position: relative; }
  .viewer-body iframe { width: 100%; height: 100%; border: none; }
  .viewer-status {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px; flex-direction: column; gap: 10px;
  }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .3; }
  .empty-text { font-size: 14px; }

  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .error-msg { background: rgba(217,92,92,.1); border: 1px solid var(--red); border-radius: 8px; padding: 14px 18px; color: var(--red); font-size: 13px; margin-bottom: 20px; }

  @media (max-width: 640px) {
    header { padding: 0 14px; height: 56px; }
    .logo-mark { width: 30px; height: 30px; font-size: 12px; }
    .logo-text { font-size: 12px; }
    .logo-sub { display: none; }
    .header-right { gap: 6px; }
    .btn-header { padding: 6px 10px; font-size: 11px; }
    .theme-toggle { width: 30px; height: 30px; }

    .main { padding: 16px 12px; }
    .toolbar { margin-bottom: 16px; }
    .search-wrap { min-width: 0; flex: 1 1 100%; }
    .counter { width: 100%; text-align: right; }

    .releases-grid { gap: 10px; }
    .release-header { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
    .release-title { font-size: 14px; flex-wrap: wrap; gap: 6px; }
    .release-date { display: none; }

    .release-assets { padding: 10px 14px; }
    .asset-row { flex-direction: column; align-items: stretch; gap: 10px; }
    .asset-left { width: 100%; }
    .asset-name { word-break: break-all; }
    .asset-actions { width: 100%; }
    .asset-actions .btn-view, .asset-actions .btn-download { flex: 1; text-align: center; }

    .viewer-box { width: 100vw; height: 100vh; max-width: none; border-radius: 0; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">PP</div>
    <div>
      <div class="logo-text">PROGRAMAÇÃO PREPARO</div>
      <div class="logo-sub">portal de download</div>
    </div>
  </div>
  <div class="header-right">
    <a href="sistema_preenchimento/formulario.html" class="btn-header">↗ Preenchimento</a>
    <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">☀</button>
  </div>
</header>

<div class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar por fazenda ou código..." oninput="filtrar()">
    </div>
    <span class="counter" id="counter">carregando...</span>
  </div>
  <div id="content"><div class="loading">Carregando releases...</div></div>
</div>

<div class="viewer-overlay" id="viewerOverlay" onclick="if(event.target===this)fecharVisualizador()">
  <div class="viewer-box">
    <div class="viewer-header">
      <span class="viewer-title" id="viewerTitle">—</span>
      <button class="viewer-close" onclick="fecharVisualizador()">&times;</button>
    </div>
    <div class="viewer-body" id="viewerBody"></div>
  </div>
</div>

<script>
const GH_OWNER = 'lmalerbo';
const GH_REPO  = 'project-preparo';
const API_URL  = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/releases?per_page=100`;
const RELEASE_PROXY_URL = 'https://project-preparo-proxy.leonardo-malerbo.workers.dev/';

let allReleases = [];

function isPdf(name) {
  return name.split('.').pop().toLowerCase() === 'pdf';
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return ext === 'dwg' ? '📐' : ext === 'pdf' ? '📄' : ext === 'zip' ? '📦' : '📎';
}

function fileLabel(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (ext === 'dwg')  return 'Projeto';
  if (ext === 'zip')  return 'Exportação';
  if (ext === 'pdf')  return 'Mapa';
  return ext.toUpperCase();
}

function fmtBytes(b) {
  if (b < 1024) return `${b} B`;
  if (b < 1024*1024) return `${(b/1024).toFixed(0)} KB`;
  return `${(b/1024/1024).toFixed(1)} MB`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
}

function renderReleases(releases) {
  const content = document.getElementById('content');
  if (!releases.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Nenhuma fazenda encontrada.</div></div>`;
    return;
  }

  content.innerHTML = `<div class="releases-grid">${releases.map(rel => {
    const assets = (rel.assets || []);
    const assetsHtml = assets.length ? assets.map(a => `
      <div class="asset-row">
        <div class="asset-left">
          <span class="asset-icon">${fileIcon(a.name)}</span>
          <div>
            <div class="asset-name">${a.name}</div>
            <div class="asset-size">${fileLabel(a.name)} · ${fmtBytes(a.size)}</div>
          </div>
        </div>
        <div class="asset-actions">
          ${isPdf(a.name) ? `<button class="btn-view" onclick="visualizarArquivo('${a.browser_download_url}','${a.name.replace(/'/g,"\\'")}')">Visualizar</button>` : ''}
          <a class="btn-download" href="${a.browser_download_url}" download>Baixar</a>
        </div>
      </div>`).join('') : `<div style="color:var(--muted);font-size:13px">Nenhum arquivo nesta fazenda.</div>`;

    return `
    <div class="release-card" data-name="${rel.name || rel.tag_name}">
      <div class="release-header" onclick="toggleCard(this.parentElement)">
        <div class="release-title">
          ${rel.name || rel.tag_name}
          <span class="release-cod">${rel.tag_name}</span>
        </div>
        <div style="display:flex;gap:14px;align-items:center">
          <span class="release-date">${fmtDate(rel.published_at || rel.created_at)}</span>
          <span class="release-chevron">▼</span>
        </div>
      </div>
      <div class="release-assets">${assetsHtml}</div>
    </div>`;
  }).join('')}</div>`;

  document.getElementById('counter').textContent = `${releases.length} fazenda(s)`;
}

function toggleCard(card) {
  card.classList.toggle('open');
}

// O GitHub serve os assets com Content-Disposition: attachment (até PDF) e sem
// CORS, então nem abrir a URL direto nem buscar via fetch() do navegador funciona
// para visualizar. O Worker (release-proxy.js) busca o arquivo no servidor — sem
// restrição de CORS — e devolve com Content-Disposition: inline, então um simples
// <iframe src="...worker.../view?..."> já renderiza o PDF.
function visualizarArquivo(url, nome) {
  const overlay = document.getElementById('viewerOverlay');
  const body = document.getElementById('viewerBody');
  document.getElementById('viewerTitle').textContent = nome;
  const viewUrl = `${RELEASE_PROXY_URL.replace(/\/+$/, '')}/view?url=${encodeURIComponent(url)}&name=${encodeURIComponent(nome)}`;
  body.innerHTML = `<iframe src="${viewUrl}" onerror="_falhaVisualizador('${url.replace(/'/g,"\\'")}','${nome.replace(/'/g,"\\'")}')"></iframe>`;
  overlay.classList.add('open');
}

function _falhaVisualizador(url, nome) {
  document.getElementById('viewerBody').innerHTML = `<div class="viewer-status">
    <span>Não foi possível visualizar este arquivo.</span>
    <a class="btn-download" href="${url}" download>⬇ Baixar em vez disso</a>
  </div>`;
}

function fecharVisualizador() {
  document.getElementById('viewerOverlay').classList.remove('open');
  document.getElementById('viewerBody').innerHTML = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') fecharVisualizador();
});

function filtrar() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q ? allReleases.filter(r =>
    (r.name || '').toLowerCase().includes(q) || (r.tag_name || '').toLowerCase().includes(q)
  ) : allReleases;
  renderReleases(filtered);
}

async function load() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`GitHub API: ${res.status} ${res.statusText}`);
    allReleases = await res.json();
    // Sort by name (fazenda name)
    allReleases.sort((a, b) => (a.name || a.tag_name).localeCompare(b.name || b.tag_name, 'pt-BR'));
    renderReleases(allReleases);
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">Erro ao carregar releases: ${e.message}</div>`;
    document.getElementById('counter').textContent = 'erro';
  }
}

function toggleTheme() {
  const h = document.documentElement;
  h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

load();
</script>
</body>
</html>
